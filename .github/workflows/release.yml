name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Generate release notes
        run: |
          echo "## RS Polymorph v${{ steps.version.outputs.VERSION }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Downloads" >> RELEASE_NOTES.md
          echo "- \`rspolymorph-${{ steps.version.outputs.VERSION }}.jar\` — Main mod file" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Requirements" >> RELEASE_NOTES.md
          echo "- Minecraft 1.21.1" >> RELEASE_NOTES.md
          echo "- NeoForge 21.1+" >> RELEASE_NOTES.md
          echo "- Polymorph >= 1.1.0" >> RELEASE_NOTES.md
          echo "- Refined Storage 2 >= 2.0.1" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "See [CHANGELOG.md](CHANGELOG.md) for full details." >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: build/libs/rspolymorph-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
