name: Build & Test

on:
  push:
    branches: [ main, staging, develop, hotfix ]
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'libs/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, staging, develop ]

permissions:
  contents: read

jobs:
  build:
    name: Build Mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RS-Polymorph-${{ github.ref_name }}
          path: build/libs/rspolymorph-*.jar
          retention-days: 30
